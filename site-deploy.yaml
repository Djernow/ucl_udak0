apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: static-site
  template:
    metadata:
      labels:
        app: static-site
    spec:
      containers:
      - name: httpd
        image: httpd:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: site-data
          mountPath: /usr/local/apache2/htdocs
      volumes:
      - name: site-data
        hostPath:
          # Replace <POOL> with your TrueNAS pool/dataset mount path.
          # e.g. /mnt/tank/www/site
          path: /mnt/immich/Jarno_app/udako
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: static-site-svc
spec:
  type: NodePort
  selector:
    app: static-site
  ports:
  - port: 80
    targetPort: 80
    # NodePort to access the site externally (change if needed)
    nodePort: 50995

# Notes:
# - Create the dataset on TrueNAS and place `website.html` into /mnt/<POOL>/www/site
# - Ensure the files are readable by the container (example: chmod -R 755 /mnt/<POOL>/www/site)
# - Apply with: kubectl apply -f site-deploy.yaml
# - Visit: http://<TRUENAS_IP>:30080