# Proxy configuration for Flask backend API
# This allows frontend (localhost:50995) to call /api/* and have requests
# forwarded to backend service on port 5000

# Enable required modules
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule rewrite_module modules/mod_rewrite.so

# Proxy /api/* requests to Flask backend
ProxyPreserveHost On

# Map /api/* to backend:5000/api/*
<Location /api>
    ProxyPass http://backend:5000/api
    ProxyPassReverse http://backend:5000/api
    ProxyPassReverse / http://backend:5000/
</Location>

# Serve website.html (or index.html) as default
<Directory /usr/local/apache2/htdocs>
    DirectoryIndex website.html index.html
    Options -Indexes FollowSymLinks
</Directory>

# Rewrite non-existent files to website.html for SPA routing
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteBase /
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /website.html [L]
</IfModule>
